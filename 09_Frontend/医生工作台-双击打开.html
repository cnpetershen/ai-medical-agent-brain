要点：未使用降压药时，诊室血压、家庭血压和动态血压均可作为判断依据。常用阈值包括诊室血压不低于 140/90 mmHg、家庭血压不低于 135/85 mmHg、24 小时动态血压不低于 130/80 mmHg。单次测量不宜直接作为充分依据，应结合规范测量和连续记录。`},{title:"片段 2：诊室血压分级",content:`来源：《中国高血压防治指南（2024年修订版）》，公开英文全文：https://pmc.ncbi.nlm.nih.gov/articles/PMC11937835/ ；发布要点：https://m.cnma.org.cn/nd.jsp?id=2561&mid=5 。

要点：诊室血压分级通常分为 1 级、2 级、3 级。1 级约为 140-159/90-99 mmHg，2 级约为 160-179/100-109 mmHg，3 级为不低于 180/110 mmHg。当收缩压和舒张压处于不同级别时，通常按较高级别处理。`},{title:"片段 3：家庭血压记录的价值",content:`来源：《中国高血压防治指南（2024年修订版）》，公开英文全文：https://pmc.ncbi.nlm.nih.gov/articles/PMC11937835/ ；发布要点：https://m.cnma.org.cn/nd.jsp?id=2561&mid=5 。

要点：家庭血压监测有助于发现晨峰、夜间或居家控制不佳等情况。复诊患者应尽量带来连续多日的家庭血压记录，帮助医生判断控制趋势、依从性和是否需要进一步评估。`}]},updated_at:"2026-07-20T10:38:17"},organize_clinical_context:{status:"succeeded",output:{mock:!0,draft_type:"医生辅助信息草稿",confirmed_pre_visit_status:"available",key_context:["患者近期家庭血压多次偏高","患者报告间断头晕","当前存在漏服药线索"],knowledge_references:["片段 1：高血压定义与测量来源","片段 2：诊室血压分级","片段 3：家庭血压记录的价值"],clinical_assistance:["请医生核对家庭血压记录的测量方式、时间和连续趋势。","请医生核对头晕症状与血压变化、漏服药之间的时间关系。","请医生结合检查结果和患者情况判断后续管理方向。"],safety_note:"仅供医生核对，不构成诊断或处方。"},updated_at:"2026-07-20T10:38:17"},generate_order_draft:{status:"succeeded",output:{mock:!0,draft_type:"医嘱草稿",doctor_assistance:["请医生核对家庭血压记录的测量方式、时间和连续趋势。","请医生核对头晕症状与血压变化、漏服药之间的时间关系。","请医生结合检查结果和患者情况判断后续管理方向。"],confirmed_order:"供医生确认的管理计划草稿：继续按医生确认方案进行规范管理，连续记录家庭血压，落实低盐饮食、规律作息和适度运动，异常情况提交医生复核。",medical_decision_status:"待医生确认",safety_note:"AI不自动开方、不自动改药、不自动修改治疗方案。"},updated_at:"2026-07-20T10:38:17"},doctor_review_during_visit_output:{status:"succeeded",output:{human_decision:"approve",confirmed_content:{mock:!0,draft_type:"医嘱草稿",doctor_assistance:["请医生核对家庭血压记录的测量方式、时间和连续趋势。","请医生核对头晕症状与血压变化、漏服药之间的时间关系。","请医生结合检查结果和患者情况判断后续管理方向。"],confirmed_order:"供医生确认的管理计划草稿：继续按医生确认方案进行规范管理，连续记录家庭血压，落实低盐饮食、规律作息和适度运动，异常情况提交医生复核。",medical_decision_status:"待医生确认",safety_note:"AI不自动开方、不自动改药、不自动修改治疗方案。"},doctor_confirmation_id:"HITL-DURING-001"},updated_at:"2026-07-20T10:38:18"},write_confirmed_during_visit_decisions:{status:"succeeded",output:{before:{patient_id:"SIM-HTN-001",memory_type:"patient_memory",privacy_note:"虚构 Patient Memory，仅用于 Demo。仅保存医生确认后的关键上下文。",baseline_memory:{patient_alias:"王某",age:58,sex:"男",known_condition:"高血压病史 3 年",current_medication:"氨氯地平片 5 mg 每日 1 次",allergy:"未诉明确药物过敏史"},pre_visit_memory:{chief_complaint:"近两周自测血压偏高，伴间断头晕，前来复诊。",bp_pattern:"2026-07-13 164/100, 2026-07-15 156/95, 2026-07-18 162/97",adherence_signal:"近两周漏服 2 次",lifestyle_signal:"近期工作压力大、睡眠不足、饮食偏咸。",doctor_confirmed:!0},in_visit_memory:{confirmed_management_plan:"供医生确认的管理计划草稿：继续按医生确认方案进行规范管理，连续记录家庭血压，落实低盐饮食
